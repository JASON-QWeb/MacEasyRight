<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8faff"/>
      <stop offset="1" stop-color="#edf2ff"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7aa7ff"/>
      <stop offset="1" stop-color="#286cff"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#4368a8" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="640" height="400" fill="url(#background)"/>
  <circle cx="48" cy="40" r="82" fill="#ffffff" opacity="0.42"/>
  <circle cx="604" cy="372" r="112" fill="#dfe9ff" opacity="0.5"/>
  <text x="320" y="58" text-anchor="middle" fill="#17233d"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif"
        font-size="25" font-weight="650">拖动 EasyRight 到“应用程序”</text>
  <text x="320" y="87" text-anchor="middle" fill="#68758e"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif"
        font-size="14">松开鼠标即可完成安装</text>
  <g filter="url(#shadow)">
    <path d="M266 216 H362" stroke="url(#arrow)" stroke-width="13" stroke-linecap="round"/>
    <path d="M351 192 L382 216 L351 240" fill="none" stroke="#286cff"
          stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="320" y="338" text-anchor="middle" fill="#8792a8"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif"
        font-size="12">首次运行时，请在“隐私与安全性”中选择“仍要打开”</text>
</svg>
